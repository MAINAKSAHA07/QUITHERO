[build]
  command = "npm run build"
  publish = "dist"
  base = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  targetPort = 5175
  port = 8888

# PocketBase proxy + SPA rules are generated into dist/_redirects at build time
# (see scripts/write-netlify-redirects.js). Set VITE_POCKETBASE_URL in Netlify env.
