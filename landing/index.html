      rel="stylesheet"
    />
    <style>
      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 100000;
        display: grid;
        place-content: center;
        padding: 20px;
        background: linear-gradient(145deg, #e8f6fc 0%, #fff8f2 55%, #ffe8d6 100%);
        transition: opacity 0.2s cubic-bezier(0.23, 1, 0.32, 1), visibility 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .boot-loader.is-done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-card {
        width: min(92vw, 320px);
        border-radius: 18px;
        border: 1px solid rgba(14, 37, 56, 0.1);
        background: rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 20px 50px rgba(32, 48, 43, 0.1);
        padding: 22px 18px 18px;
        display: grid;
        justify-items: center;
        text-align: center;
        gap: 10px;
      }
      .boot-loader img {
        width: 82px;
        height: 82px;
        object-fit: contain;
        animation: boot-bob 1.2s ease-in-out infinite;
      }
      .boot-brand {
        margin: 0;
        font-family: 'Fraunces', Georgia, serif;
        font-size: 1.2rem;
        font-weight: 600;
        color: rgba(14, 37, 56, 0.92);
        letter-spacing: -0.01em;
      }
      .boot-copy {
        margin: 0;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-size: 0.9rem;
        line-height: 1.5;
        color: rgba(14, 37, 56, 0.68);
      }
      @keyframes boot-bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .boot-spinner {
        width: 24px;
        height: 24px;
        border: 2.5px solid rgba(14, 37, 56, 0.12);
        border-top-color: #3f8dd2;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-loader img {
          animation: none;
        }
        .boot-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" class="boot-loader" aria-busy="true" aria-live="polite">
      <div class="boot-card" role="status" aria-label="Loading Smono">
        <img src="/mascot.png" alt="Smono phoenix mascot" width="82" height="82" />
        <p class="boot-brand">Smono</p>
        <p class="boot-copy">Preparing your smoke-free path...</p>
        <div class="boot-spinner" aria-hidden="true"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
