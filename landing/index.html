<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smono — Quit Smoking in 10 Days Without Willpower</title>
    <meta
      name="description"
      content="A personalised app-based quit smoking program. Remove the desire to smoke in 10 days, with 20 days of smoke-free support. CBT, mindfulness, and relapse prevention."
    />
    <meta name="theme-color" content="#F4FBFF" />
    <link rel="icon" type="image/png" href="/mascot.png" />
    <link rel="apple-touch-icon" href="/mascot.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 100000;
        display: grid;
        place-content: center;
        gap: 14px;
        background: linear-gradient(145deg, #e8f6fc 0%, #fff8f2 55%, #ffe8d6 100%);
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      .boot-loader.is-done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-loader img {
        width: 88px;
        height: 88px;
        object-fit: contain;
        margin-inline: auto;
        animation: boot-bob 1.2s ease-in-out infinite;
      }
      .boot-loader span {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(14, 37, 56, 0.55);
        text-align: center;
      }
      @keyframes boot-bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-loader img {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" class="boot-loader" aria-busy="true" aria-live="polite">
      <img src="/mascot.png" alt="" width="88" height="88" />
      <span>Smono</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
