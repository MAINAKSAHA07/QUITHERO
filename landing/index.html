    />

      rel="stylesheet"
    />
    <style>
      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 100000;
        display: grid;
        place-content: center;
        gap: 14px;
        background: linear-gradient(145deg, #e8f6fc 0%, #fff8f2 55%, #ffe8d6 100%);
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      .boot-loader.is-done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-loader img {
        width: 88px;
        height: 88px;
        object-fit: contain;
        margin-inline: auto;
        animation: boot-bob 1.2s ease-in-out infinite;
      }
      .boot-loader span {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(14, 37, 56, 0.55);
        text-align: center;
      }
      @keyframes boot-bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .boot-spinner {
        width: 24px;
        height: 24px;
        border: 2.5px solid rgba(14, 37, 56, 0.12);
        border-top-color: #3F8DD2;
        border-radius: 50%;
        margin-inline: auto;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-loader img {
          animation: none;
        }
        .boot-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" class="boot-loader" aria-busy="true" aria-live="polite">
      <img src="/mascot.png" alt="Smono phoenix mascot loading" width="88" height="88" />
      <div class="boot-spinner"></div>
      <span>Smono</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
